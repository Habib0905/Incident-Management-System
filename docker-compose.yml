services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    environment:
      POSTGRES_DB: logsystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-backend
    environment:
      APP_NAME: LogSystem
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: logsystem
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AI_PROVIDER: gemini
      AI_API_KEY: ${AI_API_KEY:-your-gemini-api-key}
      SERVER_API_KEY: ${SERVER_API_KEY:-sk_demo_server_123456789012345678901234567890123456789}
      LOG_FILE: /app/storage/logs/sample/production.log
      API_URL: http://localhost:8000/api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage/logs:/app/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

  log-ingestion:
    build:
      context: ./log-ingestion
      dockerfile: Dockerfile
    container_name: ims-log-ingestion
    environment:
      API_URL: http://backend:8000/api
      SERVER_API_KEY: ${SERVER_API_KEY:-sk_demo_server_123456789012345678901234567890123456789}
      LOG_FILE: /app/logs/sample/production.log
      POLL_INTERVAL: "2"
    volumes:
      - ./backend/storage/logs:/app/logs
    depends_on:
      - backend

volumes:
  pgdata:
